version: 2

project_name: gctx

builds:
  - main: ./cmd/gctx
    binary: gctx
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.releaseVersion={{ .Version }}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  disable: true

release:
  mode: keep-existing
  replace_existing_artifacts: true
